<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartGlass</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>

  <div class="screen">

    <!-- Top Left: Time + Date -->
    <div class="top-left">
      <div class="time" id="time">00:00 AM</div>
      <div class="date" id="date">DD/MM/YYYY</div>
    </div>

    <!-- Top Right: Weather -->
    <div class="top-right">
      <div class="weather-icon">&#9728;</div>
      <div class="weather-temp" id="weather">-- °C</div>
    </div>

    <!-- Corner brackets -->
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <!-- Center: Transcript -->
    <div class="center">
      <div class="transcript" id="text"></div>
    </div>

  </div>

  <script src="/script.js"></script>
</body>
</html>
